          do
            for scopes in `cat $(System.DefaultWorkingDirectory)/$(customPolicyPathFromRoot)/assignments/$defSet.parameters.json | jq -r '.parameters.policyAssignmentManagementGroupId.value[]'`
            do
              echo "Validating templates for Policy Assignment $defSet in scope $scopes"
              az deployment mg validate --management-group-id $scopes --location $(deploymentRegion) --name 'validate-custom-policy-set-definition-template' --template-file $defSet.bicep --parameters $(System.DefaultWorkingDirectory)/$(customPolicyPathFromRoot)/assignments/$defSet.parameters.json --parameters mgid=$scopes
            done
          done
          $(var-bashPostInjectScript)
    - task: AzureCLI@2
      displayName: 'Get Bicep Main Template Deployment What-If Result'
      inputs:
        azureSubscription: $(serviceConnection)
        scriptType: bash
        scriptLocation: inlineScript
        workingDirectory: $(System.DefaultWorkingDirectory)/policy/custom/assignments/
        inlineScript: |
          $(var-bashPreInjectScript)
          for defSet in `ls | cut -d "." -f 1`
          do
            for scopes in `cat $(System.DefaultWorkingDirectory)/$(customPolicyPathFromRoot)/assignments/$defSet.parameters.json | jq -r '.parameters.policyAssignmentManagementGroupId.value[]'`
            do
              echo "Getting What-If result for for Policy Assignment $defSet in scope $scopes"
              az deployment mg what-if --management-group-id $scopes --location $(deploymentRegion) --name 'whatif-custom-policy-set-definition-template' --template-file $defSet.bicep --parameters $(System.DefaultWorkingDirectory)/$(customPolicyPathFromRoot)/assignments/$defSet.parameters.json --parameters mgid=$scopes
            done
          done
          $(var-bashPostInjectScript)
    - task: AzureCLI@2
      displayName: Assign Custom Policy
      inputs:
        azureSubscription: $(serviceConnection)
        scriptType: bash
        scriptLocation: inlineScript
        workingDirectory: $(System.DefaultWorkingDirectory)/policy/custom/assignments/
        inlineScript: |
          $(var-bashPreInjectScript)
          for defSet in `ls | cut -d "." -f 1`
          do
            for scopes in `cat $(System.DefaultWorkingDirectory)/$(customPolicyPathFromRoot)/assignments/$defSet.parameters.json | jq -r '.parameters.policyAssignmentManagementGroupId.value[]'`
            do
              echo "Custom Policy Assignment $defSet in scope $scopes"
              az deployment mg create --management-group-id $scopes --location $(deploymentRegion) --name 'deploy-custom-policy-set-definition' --template-file $defSet.bicep --parameters $(System.DefaultWorkingDirectory)/$(customPolicyPathFromRoot)/assignments/$defSet.parameters.json --parameters mgid=$scopes
            done
          done
          $(var-bashPostInjectScript)